<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IntHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell" id="shell">
      <header class="header">
        <div class="header-left">
          <span class="logo">IntHub</span>
          <select id="project-select"></select>
        </div>
        <div class="header-right">
          <button id="refresh-btn" type="button">Refresh</button>
          <span class="chip" id="sync-chip"></span>
          <span class="chip" id="api-chip"></span>
        </div>
      </header>

      <div class="main">
        <nav class="sidebar" id="sidebar">
          <div class="tab-bar">
            <button class="tab is-active" data-tab="handoff">Handoff</button>
            <button class="tab" data-tab="intents">Intents <span class="tab-count" id="intent-count"></span></button>
            <button class="tab" data-tab="decisions">Decisions <span class="tab-count" id="decision-count"></span></button>
            <button class="tab" data-tab="snaps">Snaps <span class="tab-count" id="snap-count"></span></button>
            <button class="tab" data-tab="search">Search</button>
          </div>
          <div class="sidebar-body" id="sidebar-body"></div>
        </nav>

        <section class="detail-pane" id="detail-pane">
          <button class="back-btn" id="back-btn" type="button">&larr; Back</button>
          <div class="detail-content" id="detail-content">
            <div class="empty-state">Select an object to inspect.</div>
          </div>
        </section>
      </div>

      <footer class="footer">
        <span id="status-line" class="muted">Loading&hellip;</span>
      </footer>
    </div>
    <script src="/app.js" defer></script>
  </body>
</html>
