name: CI

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  demos-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Verify wheel install
        run: |
          python -m venv /tmp/intent-install-venv
          /tmp/intent-install-venv/bin/python -m pip install --upgrade pip
          /tmp/intent-install-venv/bin/python -m pip install dist/*.whl
          /tmp/intent-install-venv/bin/itt version
          /tmp/intent-install-venv/bin/itt --help > /dev/null

      - name: Run smoke script
        run: ./scripts/smoke.sh

      - name: Run human demo script
        run: ./scripts/demo_log.sh

      - name: Run agent demo script
        run: ./scripts/demo_agent.sh
