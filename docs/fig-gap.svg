<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif">

  <!-- Column 1: Traditional -->
  <g transform="translate(20, 0)">
    <rect x="0" y="0" width="260" height="320" rx="16" fill="#fafafa" stroke="#e5e5e5" stroke-width="1.5"/>
    <text x="130" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Traditional</text>

    <rect x="55" y="68" width="150" height="48" rx="24" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
    <text x="130" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">Human</text>

    <line x1="130" y1="116" x2="130" y2="220" stroke="#9ca3af" stroke-width="2"/>
    <polygon points="124,214 130,226 136,214" fill="#9ca3af"/>
    <rect x="96" y="152" width="68" height="28" rx="14" fill="white" stroke="#f87171" stroke-width="1.2"/>
    <text x="130" y="171" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626" font-family="'SF Mono',Menlo,Consolas,monospace">Git</text>

    <rect x="55" y="228" width="150" height="48" rx="24" fill="#f5f5f5" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="130" y="258" text-anchor="middle" font-size="15" font-weight="600" fill="#6b7280">Code</text>
  </g>

  <!-- Column 2: Agent era -->
  <g transform="translate(320, 0)">
    <rect x="0" y="0" width="260" height="320" rx="16" fill="#fafafa" stroke="#e5e5e5" stroke-width="1.5"/>
    <text x="130" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">Agent Era</text>

    <rect x="55" y="56" width="150" height="44" rx="22" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
    <text x="130" y="84" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">Human</text>

    <!-- Dashed line with gap label -->
    <line x1="130" y1="100" x2="130" y2="148" stroke="#ef4444" stroke-width="1.8" stroke-dasharray="6,4"/>
    <text x="130" y="132" text-anchor="middle" font-size="11" font-weight="600" fill="#ef4444">semantic gap</text>

    <rect x="55" y="150" width="150" height="44" rx="22" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="130" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Agent</text>

    <line x1="130" y1="194" x2="130" y2="236" stroke="#9ca3af" stroke-width="2"/>
    <polygon points="124,230 130,242 136,230" fill="#9ca3af"/>
    <rect x="96" y="204" width="68" height="28" rx="14" fill="white" stroke="#f87171" stroke-width="1.2"/>
    <text x="130" y="223" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626" font-family="'SF Mono',Menlo,Consolas,monospace">Git</text>

    <rect x="55" y="244" width="150" height="44" rx="22" fill="#f5f5f5" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="130" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#6b7280">Code</text>
  </g>

  <!-- Column 3: With Intent -->
  <g transform="translate(620, 0)">
    <rect x="0" y="0" width="260" height="320" rx="16" fill="#fafafa" stroke="#c4b5fd" stroke-width="1.8"/>
    <text x="130" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#374151">With Intent</text>

    <rect x="55" y="56" width="150" height="44" rx="22" fill="#ecfdf5" stroke="#34d399" stroke-width="1.5"/>
    <text x="130" y="84" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">Human</text>

    <!-- Solid line with Intent label -->
    <line x1="130" y1="100" x2="130" y2="148" stroke="#7c3aed" stroke-width="2"/>
    <polygon points="124,142 130,154 136,142" fill="#7c3aed"/>
    <rect x="88" y="110" width="84" height="28" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.3"/>
    <text x="130" y="129" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9" font-family="'SF Mono',Menlo,Consolas,monospace">Intent</text>

    <rect x="55" y="150" width="150" height="44" rx="22" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="130" y="178" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Agent</text>

    <line x1="130" y1="194" x2="130" y2="236" stroke="#9ca3af" stroke-width="2"/>
    <polygon points="124,230 130,242 136,230" fill="#9ca3af"/>
    <rect x="96" y="204" width="68" height="28" rx="14" fill="white" stroke="#f87171" stroke-width="1.2"/>
    <text x="130" y="223" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626" font-family="'SF Mono',Menlo,Consolas,monospace">Git</text>

    <rect x="55" y="244" width="150" height="44" rx="22" fill="#f5f5f5" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="130" y="272" text-anchor="middle" font-size="14" font-weight="600" fill="#6b7280">Code</text>
  </g>

</svg>
